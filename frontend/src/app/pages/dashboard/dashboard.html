<div class="min-h-screen bg-gradient-to-br from-slate-100 to-cyan-100 flex">

  <div class="w-64 bg-white shadow-2xl p-6 flex flex-col justify-between">

    <div>
      <h1 class="text-3xl font-bold text-cyan-600 mb-10">
        MirrorAgent
      </h1>

      <nav class="flex flex-col gap-4">
        <a
          routerLink="/dashboard"
          class="bg-cyan-500 text-white p-3 rounded-xl text-center font-semibold"
        >
          Dashboard
        </a>

        <a
          routerLink="/sales"
          class="bg-white border border-cyan-500 text-cyan-600 p-3 rounded-xl text-center font-semibold"
        >
          Ventas
        </a>

        <a
          routerLink="/chat"
          class="bg-white border border-cyan-500 text-cyan-600 p-3 rounded-xl text-center font-semibold"
        >
          Chat IA
        </a>
      </nav>
    </div>

    <button
      routerLink="/"
      class="bg-red-500 hover:bg-red-400 text-white p-3 rounded-xl font-semibold mt-10"
    >
      Cerrar sesión
    </button>

  </div>

  <div class="flex-1 p-10">

    <h2 class="text-5xl font-bold text-slate-700 mb-4">
      Dashboard 🚀
    </h2>

    <p class="text-gray-600 mb-10">
      Bienvenida a MirrorAgent AI
    </p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <div class="bg-white p-8 rounded-3xl shadow-xl overflow-hidden flex flex-col justify-between">
        <h3 class="text-xl font-bold text-gray-700">
          Ventas
        </h3>
        <p class="text-3xl lg:text-4xl font-bold text-cyan-500 mt-4 tracking-tight break-words">
          {{ totalSales | currency:'COP':'symbol-narrow':'1.0-0' }}
        </p>
      </div>

      <div class="bg-white p-8 rounded-3xl shadow-xl flex flex-col justify-between">
        <h3 class="text-xl font-bold text-gray-700">
          Clientes
        </h3>
        <p class="text-5xl font-bold text-indigo-500 mt-4">
          {{ totalProducts }}
        </p>
      </div>

      <div class="bg-white p-8 rounded-3xl shadow-xl flex flex-col justify-between">
        <h3 class="text-xl font-bold text-gray-700 mb-4">
          Recomendación IA
        </h3>

        <div 
          class="p-4 rounded-2xl transition-all duration-3xl whitespace-pre-line text-sm leading-relaxed"
          [ngClass]="{
            'bg-slate-50 border border-dashed border-cyan-200 text-slate-500 animate-pulse': loadingIA,
            'bg-cyan-50 text-gray-700 font-medium': !loadingIA
          }"
        >
          {{ aiRecommendation }}
        </div>
        
        <span *ngIf="loadingIA" class="text-xs text-cyan-500 mt-2 block font-semibold">
          🔄 Consultando modelos de Google...
        </span>
      </div>

    </div>

  </div>

</div>
