<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-100 via-cyan-100 to-indigo-200">

  <div class="bg-white/70 backdrop-blur-lg p-10 rounded-3xl w-[420px] shadow-2xl border border-white/40">

    <h1 class="text-cyan-600 text-5xl font-extrabold text-center mb-3">
      MirrorAgent AI
    </h1>

    <p class="text-center text-gray-600 mb-8">
      Asistente inteligente para emprendedores 🚀
    </p>

    <input
      type="text"
      [(ngModel)]="username"
      name="username"
      placeholder="Usuario"
      class="w-full p-4 rounded-2xl mb-4 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"
    >

    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      placeholder="Contraseña"
      class="w-full p-4 rounded-2xl mb-6 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan-400"
    >

    <button
      type="button"
      (click)="login()"
      class="w-full bg-cyan-500 hover:bg-cyan-400 transition-all duration-300 text-white font-bold p-4 rounded-2xl shadow-lg"
    >
      Ingresar
    </button>

    <p
      *ngIf="errorMessage"
      class="text-red-500 mt-4 text-center"
    >
      {{ errorMessage }}
    </p>

  </div>

</div>
